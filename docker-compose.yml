version: '3.9'

services:
  db:
    image: mongo:5.0.0
    container_name: db
    ports:
      - '${DATABASE_PORT}:${DATABASE_PORT}'
    restart: always
  server:
    image: ketjo/ez-shops:latest
    container_name: ez-shops
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - '${SERVER_PORT}:${SERVER_PORT}'
    restart: always
    links:
      - 'db'
