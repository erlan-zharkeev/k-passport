version: '3.9'

services:
  db:
    image: mongo:5.0.0
    container_name: db
    ports:
      - '${DATABASE_PORT}:27017'
    restart: always
  server:
    image: ketjo/ez-shops:latest
    container_name: ez-shops
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - '${PORT}:${PORT}'
    restart: always
    links:
      - 'db'
  webserver:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped